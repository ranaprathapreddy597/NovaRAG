<!DOCTYPE html>

    <script>
        tailwind.config = { 
            theme: { 
                extend: {

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #09090b; 
            color: #e4e4e7; 
            overscroll-behavior-y: none; 
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        
        /* Markdown Styling */
        .markdown { font-size: 0.95rem; line-height: 1.7; width: 100%; word-break: break-word; }
        .markdown h1, .markdown h2, .markdown h3 { color: #fff; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .markdown p { margin-bottom: 1rem; color: #d4d4d8; }
        .markdown ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.25rem; color: #d4d4d8; }
        
        /* Markdown Tables */
        .markdown table { width: 100%; border-collapse: collapse; text-align: left; background: #18181b; margin-bottom: 1.5rem; border-radius: 0.5rem; border: 1px solid #27272a;}
        .markdown th, .markdown td { border-bottom: 1px solid #27272a; padding: 0.75rem 1rem; font-size: 0.85rem; }
        .markdown th { background-color: #27272a; color: #fff; font-weight: 500;}
        
        /* Premium Code Block Styling */
        .markdown pre { background-color: #0d1117; padding: 1rem; border-radius: 0 0 0.5rem 0.5rem; overflow-x: auto; margin-bottom: 1.5rem; border: 1px solid #3f3f46; border-top: none; font-size: 0.85rem; }
        .markdown code:not(pre code) { background-color: #27272a; padding: 0.2rem 0.4rem; border-radius: 0.3rem; font-family: monospace; font-size: 0.85em; color: #fff; }
        
        /* Animations */
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: slideIn 0.3s ease-out forwards; }
        
        .blinking-cursor { display: inline-block; width: 6px; height: 16px; background-color: #fff; animation: blink 1s step-end infinite; margin-left: 4px; vertical-align: text-bottom; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* Input Area Styling */
        .premium-input-container { background-color: #27272a; border: 1px solid #3f3f46; border-radius: 1.5rem; transition: all 0.2s ease; }
        .premium-input-container:focus-within { border-color: #71717a; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        /* Custom Toggle Switch for Global Database */
        .toggle-checkbox:checked { right: 0; border-color: #10b981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10b981; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🔴🔴🔴 PASTE YOUR FIREBASE KEYS HERE 🔴🔴🔴
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const provider = new GoogleAuthProvider();

            const loginBtn = document.getElementById('google-login-btn');
            window.currentUserUID = null;

            loginBtn.addEventListener('click', () => {
                if (auth.currentUser) {
                    signOut(auth).then(() => {
                        window.currentUserUID = null;
                        document.getElementById('sync-text').innerText = "Local Storage";
                        document.getElementById('sync-icon').className = "fa-solid fa-cloud-arrow-up text-gray-400";
                        showToast("Signed out securely.", "success");
                    });
                } else {
                    signInWithPopup(auth, provider).catch(error => {
                        console.error("Auth Error:", error);
                        showToast("Authentication Failed.", "error");
                    });
                }
            });

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    window.currentUserUID = user.uid;
                    document.getElementById('user-name').innerText = user.displayName;
                    document.getElementById('user-email').innerText = "Cloud Sync Active";
                    document.getElementById('user-avatar').src = user.photoURL;
                    loginBtn.innerHTML = '<i class="fa-solid fa-right-from-bracket"></i> Sign Out';
                    document.getElementById('sync-text').innerText = "Firebase Cloud Sync";
                    document.getElementById('sync-icon').className = "fa-solid fa-cloud text-emerald-400";

                    // Load User's Sessions from Firestore
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists() && docSnap.data().sessions) {
                        window.allSessions = docSnap.data().sessions;
                        const sortedIds = Object.keys(window.allSessions).sort((a,b) => window.allSessions[b].updatedAt - window.allSessions[a].updatedAt);
                        if(sortedIds.length > 0) {
                            window.loadSession(sortedIds[0]);
                        } else {
                            window.createNewWorkspace();
                        }
                    } else {
                        // First login, save local to cloud
                        if(window.saveToCloud) window.saveToCloud(window.allSessions);
                    }
                } else {
                    window.currentUserUID = null;
                    document.getElementById('user-name').innerText = "Guest User";
                    document.getElementById('user-email').innerText = "Not Synced";
                    document.getElementById('user-avatar').src = "https://ui-avatars.com/api/?name=Guest&background=18181b&color=fff";
                    loginBtn.innerHTML = '<i class="fa-brands fa-google"></i> Sign in with Google';
                }
            });

            window.saveToCloud = async function(sessionsObj) {
                if (window.currentUserUID) {
                    await setDoc(doc(db, "users", window.currentUserUID), { sessions: sessionsObj }, { merge: true });
                }
            };
        } catch(e) { 
            console.warn("Firebase is not configured correctly. Check your API keys."); 
        }
    </script>

    <script>
        // 🔴 Ensure this points to your Render backend 🔴
        const API_URL = "https://novarag-api.onrender.com"; 

        // UI Toggles
        function openSidebar() { 
            document.getElementById('app-sidebar').classList.remove('-translate-x-full'); 
            document.getElementById('sidebar-backdrop').classList.remove('hidden'); 
        }
        function closeSidebar() { 
            document.getElementById('app-sidebar').classList.add('-translate-x-full'); 
            document.getElementById('sidebar-backdrop').classList.add('hidden'); 
        }
        function toggleSettings() { 
            document.getElementById('settings-modal').classList.toggle('hidden'); 
            if(window.innerWidth < 768) closeSidebar(); 
        }
        function toggleWebSearch() {
            useWebSearch = !useWebSearch;
            const btn = document.getElementById('web-btn');
            if(useWebSearch) {
                btn.classList.replace('text-gray-400', 'text-white'); 
            } else {
                btn.classList.replace('text-white', 'text-gray-400');
            }
        }

        // --- MARKDOWN & SYNTAX HIGHLIGHTING ENGINE ---
        const renderer = new marked.Renderer();
        
        // Custom Table Wrapper
        renderer.table = function(header, body) { 
            return `<div class="table-wrapper"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`; 
        };
        
        // Custom Code Block Wrapper with "Copy Code" Button
        renderer.code = function(code, language) {
            const validLang = hljs.getLanguage(language) ? language : 'plaintext';
            const highlighted = hljs.highlight(code, { language: validLang }).value;
            const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
            return `
                <div class="relative group mb-4 font-sans">
                    <div class="flex items-center justify-between bg-[#27272a] text-gray-400 px-3 py-1.5 text-[11px] uppercase tracking-wider font-semibold rounded-t-md border border-[#3f3f46] border-b-0">
                        <span>${validLang}</span>
                        <button onclick="copyCode('${codeId}')" class="hover:text-white transition-colors flex items-center gap-1.5">
                            <i class="fa-regular fa-copy"></i> Copy code
                        </button>
                    </div>
                    <pre class="!mt-0 !rounded-t-none"><code id="${codeId}" class="hljs ${validLang}">${highlighted}</code></pre>
                </div>
            `;
        };
        marked.setOptions({ renderer: renderer });

        window.copyCode = function(id) { 
            const codeText = document.getElementById(id).innerText;
            navigator.clipboard.writeText(codeText); 
            showToast("Code copied to clipboard!", "success"); 
        }

        // --- MULTI-WORKSPACE SESSION MANAGEMENT ---
        window.allSessions = JSON.parse(localStorage.getItem('novarag_sessions')) || {};
        let sessionId = localStorage.getItem('novarag_session_id') || crypto.randomUUID();
        
        if (!window.allSessions[sessionId]) {
            window.allSessions[sessionId] = { title: "New Workspace", history: [], updatedAt: Date.now() };
        }
        window.chatHistory = window.allSessions[sessionId].history;

        let useWebSearch = false; 
        let activeTemp = 0.2;
        const chatBox = document.getElementById('chat-box'); 
        const chatInput = document.getElementById('chat-input');

        window.onload = () => { 
            renderChatHistory(); 
            updateSidebarSessions(); 
        }

        function renderChatHistory() {
            document.getElementById('chat-content').innerHTML = '';
            if(window.chatHistory.length > 0) {
                document.getElementById('welcome-screen').classList.add('hidden');
                window.chatHistory.forEach(msg => {
                    window.addMessage(msg.content, msg.role === 'user' ? 'user' : 'bot', true);
                });
            } else {
                document.getElementById('welcome-screen').classList.remove('hidden');
            }
        }

        function saveLocalData() { 
            // Smart Title Generator based on the first prompt
            if(window.chatHistory.length > 0 && window.allSessions[sessionId].title === "New Workspace") {
                let firstMsg = window.chatHistory.find(m => m.role === 'user');
                if(firstMsg) {
                    let cleanTitle = firstMsg.content.replace(/^(write|create|generate|what is|how to|can you|analyze)\s+/i, '');
                    cleanTitle = cleanTitle.charAt(0).toUpperCase() + cleanTitle.slice(1);
                    window.allSessions[sessionId].title = cleanTitle.substring(0, 22) + (cleanTitle.length > 22 ? "..." : "");
                }
            }
            window.allSessions[sessionId].history = window.chatHistory; 
            window.allSessions[sessionId].updatedAt = Date.now();
            
            localStorage.setItem('novarag_sessions', JSON.stringify(window.allSessions)); 
            localStorage.setItem('novarag_session_id', sessionId);
            
            updateSidebarSessions(); 
            if(window.saveToCloud) window.saveToCloud(window.allSessions); 
        }

        function updateSidebarSessions() {
            const list = document.getElementById('sessions-list'); 
            list.innerHTML = '';
            
            const sortedIds = Object.keys(window.allSessions).sort((a,b) => window.allSessions[b].updatedAt - window.allSessions[a].updatedAt);
            
            sortedIds.forEach(id => {
                // Don't show empty ghost sessions in sidebar unless active
                if(window.allSessions[id].history.length === 0 && id !== sessionId) return; 
                
                const wrapper = document.createElement('div');
                wrapper.className = `w-full flex items-center justify-between px-3 py-2.5 rounded-lg mb-1 group transition-all cursor-pointer ${id === sessionId ? 'bg-[#27272a] text-white border border-[#3f3f46]' : 'text-gray-400 hover:bg-[#18181b] hover:text-gray-200'}`;
                
                const titleBtn = document.createElement('div'); 
                titleBtn.className = "flex-1 truncate text-[13px] font-medium flex items-center gap-2";
                titleBtn.innerHTML = `<i class="fa-regular fa-message text-[11px] opacity-70"></i> <span class="truncate">${window.allSessions[id].title}</span>`;
                titleBtn.onclick = () => window.loadSession(id);
                
                const delBtn = document.createElement('button'); 
                delBtn.className = "opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 transition-all px-1";
                delBtn.innerHTML = `<i class="fa-regular fa-trash-can"></i>`; 
                delBtn.onclick = (e) => { 
                    e.stopPropagation(); 
                    window.deleteWorkspace(id); 
                };
                
                wrapper.appendChild(titleBtn); 
                wrapper.appendChild(delBtn); 
                list.appendChild(wrapper);
            });
        }

        window.loadSession = function(id) {
            sessionId = id; 
            localStorage.setItem('novarag_session_id', sessionId);
            window.chatHistory = window.allSessions[sessionId].history || [];
            
            document.getElementById('cif-badge').classList.add('hidden'); 
            document.getElementById('upload-status').classList.add('hidden');
            
            renderChatHistory(); 
            updateSidebarSessions(); 
            if(window.innerWidth < 768) closeSidebar();
        }

        window.createNewWorkspace = function() {
            if(window.chatHistory.length === 0) { 
                if(window.innerWidth < 768) closeSidebar(); 
                return; 
            }
            
            sessionId = crypto.randomUUID(); 
            window.allSessions[sessionId] = { title: "New Workspace", history: [], updatedAt: Date.now() };
            window.chatHistory = []; 
            localStorage.setItem('novarag_session_id', sessionId);
            
            renderChatHistory(); 
            updateSidebarSessions();
            
            document.getElementById('cif-badge').classList.add('hidden'); 
            document.getElementById('upload-status').classList.add('hidden');
            if(window.innerWidth < 768) closeSidebar();
        }

        window.deleteWorkspace = function(id) {
            if(!confirm("Are you sure you want to delete this workspace?")) return;
            delete window.allSessions[id];
            
            if(id === sessionId) {
                window.createNewWorkspace(); 
            } else { 
                localStorage.setItem('novarag_sessions', JSON.stringify(window.allSessions)); 
                updateSidebarSessions(); 
            }
            
            if(window.saveToCloud) window.saveToCloud(window.allSessions);
            showToast("Workspace deleted.", "success");
        }

        function showToast(msg, type='success') {
            const t = document.createElement('div');
            t.className = `bg-[#18181b] border-l-2 ${type==='success'?'border-emerald-500':'border-red-500'} shadow-2xl p-3 md:p-3.5 rounded-lg flex items-center gap-3 animate-in w-full md:w-auto md:min-w-[250px] z-50`;
            t.innerHTML = `<span class="text-[13px] md:text-sm font-medium text-gray-200">${msg}</span>`;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => { 
                t.style.opacity = '0'; 
                setTimeout(() => t.remove(), 400); 
            }, 3500);
        }

        function exportChat() {
            if(window.chatHistory.length === 0) { 
                showToast('No data to export.', 'warning'); 
                return; 
            }
            let exportText = `# ${window.allSessions[sessionId].title}\n\n---\n\n`;
            window.chatHistory.forEach(msg => { 
                exportText += `### ${msg.role === 'user' ? 'User' : 'NovaRAG'}\n${msg.content}\n\n---\n\n`; 
            });
            const blob = new Blob([exportText], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); 
            a.href = url; 
            a.download = `${window.allSessions[sessionId].title.replace(/\s+/g, '_')}.md`;
            document.body.appendChild(a); 
            a.click(); 
            document.body.removeChild(a); 
            URL.revokeObjectURL(url);
        }

        // Handle Enter Key for Input
        chatInput.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) { 
                e.preventDefault(); 
                sendMessage(); 
            } 
        });

        // --- FILE UPLOAD (WITH DUAL-RAG GLOBAL OPT-IN) ---
        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0]; 
            if (!file) return;
            
            if (file.size > 15 * 1024 * 1024) { 
                showToast("Max 15MB allowed.", "warning"); 
                e.target.value = ''; 
                return; 
            }

            const status = document.getElementById('upload-status');
            status.classList.remove('hidden'); 
            status.innerText = "Encrypting & Indexing...";
            
            const fd = new FormData(); 
            fd.append("file", file); 
            fd.append("session_id", sessionId);
            
            // Check if user allowed pushing to Global Database
            const isGlobalOptIn = document.getElementById('global-opt-in').checked;
            fd.append("global_opt_in", isGlobalOptIn);

            try {
                const res = await fetch(`${API_URL}/upload`, { 
                    method: 'POST', 
                    body: fd 
                });
                const data = await res.json();
                
                if(data.status === "success") {
                    status.innerText = isGlobalOptIn ? `✓ Sent to Global DB` : `✓ Secured Locally`; 
                    showToast(data.message, 'success');
                    if(file.name.endsWith('.pdf') || file.name.endsWith('.cif')) {
                        document.getElementById('cif-badge').classList.remove('hidden');
                    }
                } else {
                    throw new Error(data.message);
                }
            } catch (err) { 
                status.innerText = "Upload failed."; 
                showToast(err.message, 'error'); 
            }
            e.target.value = '';
        });

        // --- INFERENCE COMMUNICATION ---
        async function sendMessage() {
            const text = chatInput.value.trim(); 
            if (!text) return;
            
            document.getElementById('welcome-screen').classList.add('hidden');
            window.addMessage(text, 'user'); 
            
            chatInput.value = ''; 
            chatInput.style.height = 'auto';
            document.getElementById('status-bar').classList.remove('hidden');
            
            const botBubble = window.addMessage('<span class="blinking-cursor"></span>', 'bot');
            let botText = "";

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        session_id: sessionId, 
                        message: text, 
                        history: window.chatHistory, 
                        use_web: useWebSearch, 
                        temperature: activeTemp 
                    })
                });
                
                if (!response.ok) throw new Error("Server error.");

                const reader = response.body.getReader(); 
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read(); 
                    if (done) break;
                    
                    const lines = decoder.decode(value).split('\n\n');
                    for (let line of lines) {
                        if (line.startsWith('data: ')) {
                            let payload = line.replace('data: ', ''); 
                            if (payload === '[DONE]') break;
                            
                            botText += payload.replace(/<br>/g, "\n");
                            botBubble.innerHTML = marked.parse(botText) + '<span class="blinking-cursor"></span>';
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                }
                botBubble.innerHTML = marked.parse(botText);
                window.chatHistory.push({ role: "user", content: text }, { role: "assistant", content: botText });
                saveLocalData();
                
            } catch (err) { 
                botBubble.innerHTML = `<span class="text-red-400">Network error. Is the server running?</span>`; 
            }
            
            document.getElementById('status-bar').classList.add('hidden');
        }

        // --- UI MESSAGE APPENDER ---
        window.addMessage = function(text, role, isHistoryLoad = false) {
            const wrapper = document.createElement('div'); 
            wrapper.className = `flex gap-2 md:gap-4 mb-5 md:mb-6 w-full animate-in ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            
            if (role === 'user') { 
                bubble.className = `max-w-[85%] md:max-w-[75%] bg-[#27272a] text-gray-100 px-4 py-2.5 md:px-5 md:py-3.5 rounded-2xl rounded-tr-sm text-[14px] md:text-[15px] shadow-sm break-words`; 
                bubble.innerHTML = text; 
            } else { 
                wrapper.innerHTML = `<div class="w-7 h-7 md:w-8 md:h-8 rounded-lg bg-black flex items-center justify-center text-black font-bold flex-shrink-0 shadow-sm mt-1 border border-[#3f3f46]"><img src="/logo.png" class="w-full h-full rounded-lg object-cover"></div>`; 
                bubble.className = `max-w-[85%] bg-transparent text-[#e4e4e7] markdown pt-0.5 overflow-hidden w-full`; 
                bubble.innerHTML = isHistoryLoad ? marked.parse(text) : text; 
            }
            
            wrapper.appendChild(bubble); 
            document.getElementById('chat-content').appendChild(wrapper); 
            chatBox.scrollTop = chatBox.scrollHeight; 
            
            return bubble;
        }
    </script>
</body>
</html>
